<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        body{
            background-color: bisque;
        }
        h1{
            background-color: lightgray;
            height: 275px;
            width: 275px;

            border: 10px solid darkslategray;

            padding: 5px 10px 10px 15px;

            margin: 5px auto 20px auto;

            outline: 5px groove darkslategray;
        }
        
        a{
            border: 5px ridge red;

            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos tamnbém são exemplos de box-level, mas os <a href="#">links são emxemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
